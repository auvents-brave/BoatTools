name: Release

on:
  push:
    branches: [lab]
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.3.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            platform: macos
            arch: universal
            swift-flags: --arch arm64 --arch x86_64
          - runner: ubuntu-24.04
            platform: linux
            arch: x86_64
            swift-flags: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode (macOS)
        if: matrix.platform == 'macos'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Install Swiftly (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates gpg libavahi-compat-libdnssd-dev
          curl -L "https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz" -o swiftly.tar.gz
          tar zxf swiftly.tar.gz
          ./swiftly init --assume-yes --skip-install
          . "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
          echo "${SWIFTLY_BIN_DIR}" >> "$GITHUB_PATH"
          swiftly install "${{ env.SWIFT_VERSION }}" --post-install-file=post-install.sh
          if [ -f post-install.sh ]; then
            sudo bash ./post-install.sh
          fi
          swiftly use "${{ env.SWIFT_VERSION }}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release ${{ matrix.swift-flags }}
          echo "BINDIR=$(swift build -c release ${{ matrix.swift-flags }} --show-bin-path)" >> "$GITHUB_ENV"

      - name: Sign, package, notarize & staple (macOS)
        if: matrix.platform == 'macos'
        env:
          APP_P12: ${{ secrets.MACOS_CERT_APP_P12 }}
          APP_PWD: ${{ secrets.MACOS_CERT_APP_PASSWORD }}
          INSTALLER_P12: ${{ secrets.MACOS_CERT_INSTALLER_P12 }}
          INSTALLER_PWD: ${{ secrets.MACOS_CERT_INSTALLER_PASSWORD }}
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail

          # --- Ephemeral keychain holding both Developer ID identities.
          # Kept in this single step so it stays unlocked and is referenced
          # explicitly via `--keychain`, avoiding cross-step search-list issues.
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[" ]//g')
          printf '%s' "$APP_P12"       | base64 --decode > "$RUNNER_TEMP/app.p12"
          printf '%s' "$INSTALLER_P12" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/app.p12"       -P "$APP_PWD"       -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security import "$RUNNER_TEMP/installer.p12" -P "$INSTALLER_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"
          echo "Signing identities in the build keychain:"
          security find-identity -v "$KEYCHAIN"

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0"; fi
          ASSET="boattools-macos-universal.pkg"

          # 1) Sign the binary — hardened runtime + secure timestamp (required to notarize).
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN" --sign "Developer ID Application" "$BINDIR/boattools"
          codesign --verify --strict --verbose=2 "$BINDIR/boattools"

          # 2) Build a component package installing the tool into /usr/local/bin.
          PKGROOT="$RUNNER_TEMP/pkgroot"
          mkdir -p "$PKGROOT/usr/local/bin"
          cp "$BINDIR/boattools" "$PKGROOT/usr/local/bin/boattools"
          pkgbuild --root "$PKGROOT" \
            --identifier "com.auvents-brave.boattools" \
            --version "$VERSION" \
            --install-location "/" \
            "$RUNNER_TEMP/component.pkg"

          # 3) Sign the package with the Installer identity.
          productsign --keychain "$KEYCHAIN" \
            --sign "Developer ID Installer" "$RUNNER_TEMP/component.pkg" "$ASSET"

          # 4) Notarize, then staple the ticket onto the package.
          printf '%s' "$NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$ASSET" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          rm -f "$RUNNER_TEMP/AuthKey.p8"
          xcrun stapler staple "$ASSET"
          xcrun stapler validate "$ASSET"
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          ASSET="boattools-linux-x86_64.tar.gz"
          tar czf "$ASSET" -C "$BINDIR" boattools
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: boattools-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: ignore
          path: |
            boattools-macos-universal.pkg
            boattools-macos-universal.pkg.sha256
            boattools-linux-x86_64.tar.gz
            boattools-linux-x86_64.tar.gz.sha256

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Tagged release on main — a permanent versioned release.
            gh release create "${{ github.ref_name }}" dist/* \
              --title "${{ github.ref_name }}" \
              --generate-notes
          else
            # Rolling pre-release tracking the tip of the lab branch.
            # Named "latest" (not "lab") so the git tag it creates does not
            # collide with the "lab" branch.
            gh release delete latest --yes --cleanup-tag 2>/dev/null || true
            gh release create latest dist/* \
              --target "${{ github.sha }}" \
              --title "Latest lab build" \
              --prerelease \
              --notes "Rolling build from the lab branch — commit ${{ github.sha }}."
          fi
